name: iOS Build & TestFlight

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install codemagic-cli-tools
        run: pip3 install codemagic-cli-tools --break-system-packages

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Setup signing (Distribution cert + App Store profile)
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

        run: |
          # 인증서용 개인키 준비 (저장된 시크릿이 있으면 사용, 없으면 새로 생성)
          if [ -n "${{ secrets.CERTIFICATE_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.CERTIFICATE_PRIVATE_KEY }}" > /tmp/dist_key.pem
          else
            openssl genrsa -out /tmp/dist_key.pem 2048
            echo "=== CERTIFICATE_PRIVATE_KEY (GitHub Secret에 저장 필요) ==="
            cat /tmp/dist_key.pem
            echo "============================================================"
          fi

          # 임시 키체인 초기화
          keychain initialize

          # Distribution 인증서 + App Store 프로파일 생성/다운로드
          # 파일 내용을 직접 환경변수에 주입
          CERTIFICATE_PRIVATE_KEY="$(cat /tmp/dist_key.pem)" \
          app-store-connect fetch-signing-files com.paymoa.app \
            --type IOS_APP_STORE \
            --create

          # 키체인에 인증서 설치
          keychain add-certificates

          # Xcode 프로젝트에 Manual 서명 + 프로파일 자동 적용
          xcode-project use-profiles

      - name: Flutter build iOS release
        run: flutter build ios --release --no-codesign

      - name: Xcode archive
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            DEVELOPMENT_TEAM=G9ZKTNDZ3P \
            CODE_SIGN_STYLE=Manual \
            archive

      - name: Export IPA
        run: |
          # archive에 이미 embed된 프로파일에서 이름 읽기
          PROFILE_PATH="$RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app/embedded.mobileprovision"

          if [ ! -f "$PROFILE_PATH" ]; then
            echo "embedded.mobileprovision 없음, Xcode 경로에서 검색"
            PROFILE_PATH=$(find "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
              -name "*.mobileprovision" 2>/dev/null | head -1)
          fi

          echo "프로파일 경로: $PROFILE_PATH"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "프로파일 이름: $PROFILE_NAME"

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>G9ZKTNDZ3P</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.paymoa.app</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: app-store-connect publish --path $RUNNER_TEMP/ipa/*.ipa
