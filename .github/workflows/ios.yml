name: iOS Build & TestFlight

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Install Codemagic CLI tools
        run: pip3 install codemagic-cli-tools --break-system-packages

      - name: Fetch signing certificates & profiles
        run: |
          app-store-connect fetch-signing-files com.paymoa.app \
            --type IOS_APP_STORE \
            --create \
            --api-key ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --issuer-id ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            --private-key @file:~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Add certificates to keychain
        run: |
          keychain initialize
          keychain add-certificates

      - name: Set Xcode code signing settings
        run: |
          xcode-project use-profiles

      - name: Flutter build iOS (release)
        run: flutter build ios --release --no-codesign

      - name: Build IPA
        run: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

      - name: Upload to TestFlight
        run: |
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --api-key ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --issuer-id ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            --private-key @file:~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
