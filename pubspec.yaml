name: paycount
description: Paycount Flutter port
publish_to: "none"

version: 1.0.0+1

environment:
  # Dart 3.6 이상
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ▶ 영구 저장(역할/설정 등)
  shared_preferences: ^2.3.2

  # ▶ 상태/유틸
  collection: ^1.18.0
  uuid: ^4.5.1
  intl: ^0.20.2
  provider: ^6.0.5
  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0

  # ▶ 차트
  fl_chart: ^0.69.0

  # ▶ 시스템 알림
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2

  # ▶ Firebase (검증된 조합)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3

  # ❗ 중요: 6.x로 고정 (AuthService 코드와 100% 호환)
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
