name: paycount
description: Paycount Flutter port
publish_to: "none"

version: 1.0.0+1

environment:
  # digit-separators(1_000_000) 및 fl_chart 최신 API 위해 3.6.0+
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태/유틸
  collection: ^1.18.0
  uuid: ^4.5.1
  intl: ^0.19.0
  provider: ^6.0.5
  cupertino_icons: ^1.0.8

  # ▶ 차트
  fl_chart: ^0.69.0

  # ▶ 시스템 알림(안드로이드/iOS 공통)
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2

  # ▶ 알림 설정 영구 저장(필수)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
